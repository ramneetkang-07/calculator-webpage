<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>

<body>
    <header>
        <h1>Calculator</h1>
    </header>

    <main>
        <div>
            <input type="text" id="display" disabled>
        </div>

        <div id="buttons">
            <div class="erase">
                <button>AC</button>
                <button>CLEAR</button>
            </div>

            <div class="numbers">
                <div class="seven-to-nine">
                    <button>7</button>
                    <button>8</button>
                    <button>9</button>
                </div>

                <div class="four-to-six">
                    <button>4</button>
                    <button>5</button>
                    <button>6</button>
                </div>

                <div class="one-to-three">
                    <button>1</button>
                    <button>2</button>
                    <button>3</button>
                </div>

                <div class="symbols">
                    <button id="decimal">.</button>
                    <button>0</button>
                    <button id="equal-to">=</button>
                </div>
            </div>

            <div class="operators">
                <button>+</button>
                <button>-</button>
                <button>*</button>
                <button>/</button>
            </div>

        </div>
    </main>

    <footer>
        <p>Copyright © 2026 | All Rights Reserved</p>
    </footer>

</body>

</html>
