<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header>
        <h1>Calculator</h1>
    </header>

    <main>
        <div>
            <input type="text" id="display" disabled>
        </div>

        <div class="buttons">
            <div class="erase">
                <button value="delete">DELETE</button>
                <button value="clear">CLEAR</button>
            </div>

            <div class="numbers-and-operators">
                <div class="seven-to-nine">
                    <button value="7" class="number">7</button>
                    <button value="8" class="number">8</button>
                    <button value="9" class="number">9</button>
                </div>

                <div class="four-to-six">
                    <button value="4" class="number">4</button>
                    <button value="5" class="number">5</button>
                    <button value="6" class="number">6</button>
                </div>

                <div class="one-to-three">
                    <button value="1" class="number">1</button>
                    <button value="2" class="number">2</button>
                    <button value="3" class="number">3</button>
                </div>

                <div class="symbols">
                    <button id="decimal" value=".">.</button>
                    <button value="0" class="number">0</button>
                    <button id="equal-to" value="=">=</button>
                </div>
            </div>

            <div class="operators">
                <button class="operator" value="+">+</button>
                <button class="operator" value="-">-</button>
                <button class="operator" value="*">X</button>
                <button class="operator" value="/">÷</button>
            </div>

        </div>
    </main>

    <footer>
        <p>Copyright © 2026 | All Rights Reserved</p>
    </footer>

    <script src="./script.js"></script>

</body>

</html>
