<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header>
        <h1>Calculator</h1>
    </header>

    <main>
        <div>
            <input type="text" class="display" readonly>
        </div>

        <div class="buttons">
            <div class="erase">
                <button id="delete", value="delete">DELETE</button>
                <button id="clear", value="clear">CLEAR</button>
            </div>

            <div class="numbers-and-operators">
                <div id="row1">
                    <button value="7" class="numbers">7</button>
                    <button value="8" class="numbers">8</button>
                    <button value="9" class="numbers">9</button>
                    <button class="operators" value="/">÷</button>
                </div>

                <div id="row2">
                    <button value="4" class="numbers">4</button>
                    <button value="5" class="numbers">5</button>
                    <button value="6" class="numbers">6</button>
                    <button class="operators" value="*">x</button>
                </div>

                <div id="row3">
                    <button value="1" class="numbers">1</button>
                    <button value="2" class="numbers">2</button>
                    <button value="3" class="numbers">3</button>
                    <button class="operators" value="-">-</button>
                </div>

                <div id="row4">
                    <button id="decimal" value=".">.</button>
                    <button value="0" class="numbers">0</button>
                    <button id="equal-to" value="=">=</button>
                    <button class="operators" value="+">+</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>Copyright © 2026 | All Rights Reserved</p>
    </footer>

    <script src="./script.js"></script>

</body>

</html>
